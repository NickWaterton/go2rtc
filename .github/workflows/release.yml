name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.9.10-onvif1)'
        required: true

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    env: { CGO_ENABLED: 0 }
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with: { go-version: '1.23' }

      - name: Set release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      # Create tag if triggered manually and it doesn't exist yet
      - name: Create git tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.tag.outputs.name }} || true
          git push origin ${{ steps.tag.outputs.name }} || true

      # Windows — zip
      - name: Build go2rtc_win64
        env: { GOOS: windows, GOARCH: amd64 }
        run: go build -ldflags "-s -w" -trimpath -o go2rtc.exe && zip go2rtc_win64.zip go2rtc.exe && rm go2rtc.exe

      - name: Build go2rtc_win32
        env: { GOOS: windows, GOARCH: 386 }
        run: go build -ldflags "-s -w" -trimpath -o go2rtc.exe && zip go2rtc_win32.zip go2rtc.exe && rm go2rtc.exe

      - name: Build go2rtc_win_arm64
        env: { GOOS: windows, GOARCH: arm64 }
        run: go build -ldflags "-s -w" -trimpath -o go2rtc.exe && zip go2rtc_win_arm64.zip go2rtc.exe && rm go2rtc.exe

      # Linux — raw binary
      - name: Build go2rtc_linux_amd64
        env: { GOOS: linux, GOARCH: amd64 }
        run: go build -ldflags "-s -w" -trimpath -o go2rtc_linux_amd64

      - name: Build go2rtc_linux_i386
        env: { GOOS: linux, GOARCH: 386 }
        run: go build -ldflags "-s -w" -trimpath -o go2rtc_linux_i386

      - name: Build go2rtc_linux_arm64
        env: { GOOS: linux, GOARCH: arm64 }
        run: go build -ldflags "-s -w" -trimpath -o go2rtc_linux_arm64

      - name: Build go2rtc_linux_arm
        env: { GOOS: linux, GOARCH: arm, GOARM: 7 }
        run: go build -ldflags "-s -w" -trimpath -o go2rtc_linux_arm

      - name: Build go2rtc_linux_armv6
        env: { GOOS: linux, GOARCH: arm, GOARM: 6 }
        run: go build -ldflags "-s -w" -trimpath -o go2rtc_linux_armv6

      - name: Build go2rtc_linux_mipsel
        env: { GOOS: linux, GOARCH: mipsle }
        run: go build -ldflags "-s -w" -trimpath -o go2rtc_linux_mipsel

      # macOS — zip
      - name: Build go2rtc_mac_amd64
        env: { GOOS: darwin, GOARCH: amd64 }
        run: go build -ldflags "-s -w" -trimpath -o go2rtc && zip go2rtc_mac_amd64.zip go2rtc && rm go2rtc

      - name: Build go2rtc_mac_arm64
        env: { GOOS: darwin, GOARCH: arm64 }
        run: go build -ldflags "-s -w" -trimpath -o go2rtc && zip go2rtc_mac_arm64.zip go2rtc && rm go2rtc

      # FreeBSD — zip
      - name: Build go2rtc_freebsd_amd64
        env: { GOOS: freebsd, GOARCH: amd64 }
        run: go build -ldflags "-s -w" -trimpath -o go2rtc && zip go2rtc_freebsd_amd64.zip go2rtc && rm go2rtc

      - name: Build go2rtc_freebsd_arm64
        env: { GOOS: freebsd, GOARCH: arm64 }
        run: go build -ldflags "-s -w" -trimpath -o go2rtc && zip go2rtc_freebsd_arm64.zip go2rtc && rm go2rtc

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.tag.outputs.name }} \
            --title "go2rtc ${{ steps.tag.outputs.name }} (ONVIF fork)" \
            --generate-notes \
            go2rtc_win64.zip \
            go2rtc_win32.zip \
            go2rtc_win_arm64.zip \
            go2rtc_linux_amd64 \
            go2rtc_linux_i386 \
            go2rtc_linux_arm64 \
            go2rtc_linux_arm \
            go2rtc_linux_armv6 \
            go2rtc_linux_mipsel \
            go2rtc_mac_amd64.zip \
            go2rtc_mac_arm64.zip \
            go2rtc_freebsd_amd64.zip \
            go2rtc_freebsd_arm64.zip
